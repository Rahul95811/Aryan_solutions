<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="AI Monitoring CCTV">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgA)"/>

  <!-- monitor grid -->
  <g transform="translate(60,50)">
    <rect x="0" y="0" width="680" height="400" rx="8" fill="#0F172A"/>
    <rect x="20" y="20" width="300" height="180" rx="6" fill="#0B1220"/>
    <rect x="360" y="20" width="300" height="180" rx="6" fill="#0B1220"/>
    <rect x="20" y="220" width="640" height="150" rx="6" fill="#0B1220"/>

    <!-- detection box on left feed -->
    <rect x="60" y="60" width="90" height="60" rx="4" fill="none" stroke="#0EA5E9" stroke-width="2"/>
    <text x="105" y="95" text-anchor="middle" fill="#0EA5E9" font-family="Inter,sans-serif" font-size="10">Person</text>

    <!-- radar on right feed -->
    <circle cx="520" cy="110" r="28" fill="none" stroke="#0EA5E9" stroke-dasharray="4 4"/>
    <circle cx="520" cy="110" r="6" fill="#0EA5E9"/>

    <!-- progress bar -->
    <rect x="40" y="300" width="620" height="10" rx="5" fill="#152033"/>
    <rect x="40" y="300" width="420" height="10" rx="5" fill="#2563EB"/>
  </g>

  <text x="400" y="470" text-anchor="middle" fill="#94A3B8" font-family="Inter,sans-serif" font-size="14">AI-Powered Surveillance Analytics</text>
</svg>
