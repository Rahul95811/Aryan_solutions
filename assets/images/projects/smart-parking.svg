<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Smart Parking System">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bgP)"/>

  <!-- Parking slots row -->
  <g transform="translate(80,80)" filter="url(#shadow)">
    <!-- slots -->
    <g id="slots">
      <rect x="0" y="0" width="120" height="200" rx="8" fill="#10B981" opacity="0.14" stroke="#10B981" stroke-width="2"/>
      <rect x="150" y="0" width="120" height="200" rx="8" fill="#EF4444" opacity="0.14" stroke="#EF4444" stroke-width="2"/>
      <rect x="300" y="0" width="120" height="200" rx="8" fill="#10B981" opacity="0.14" stroke="#10B981" stroke-width="2"/>
      <rect x="450" y="0" width="120" height="200" rx="8" fill="#10B981" opacity="0.14" stroke="#10B981" stroke-width="2"/>
      <rect x="600" y="0" width="80" height="200" rx="8" fill="#EF4444" opacity="0.14" stroke="#EF4444" stroke-width="2"/>
      <text x="60" y="100" text-anchor="middle" fill="#065F46" font-family="Inter,sans-serif" font-size="13">OPEN</text>
      <text x="210" y="100" text-anchor="middle" fill="#991B1B" font-family="Inter,sans-serif" font-size="13">FULL</text>
    </g>

    <!-- status bar card -->
    <rect x="0" y="240" width="680" height="110" rx="14" fill="#0F172A"/>
    <rect x="30" y="270" width="260" height="44" rx="8" fill="#2563EB"/>
    <text x="160" y="300" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="13">3 Slots Available</text>
  </g>

  <text x="400" y="470" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="14">IoT Smart Parking Management</text>
</svg>
