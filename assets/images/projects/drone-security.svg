<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Drone Security System">
  <defs>
    <linearGradient id="skyD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6F7FF"/>
      <stop offset="100%" stop-color="#F8FAFF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#skyD)"/>

  <!-- drone body -->
  <g transform="translate(200,80)">
    <ellipse cx="200" cy="120" rx="80" ry="24" fill="#0B1220" opacity="0.9"/>
    <line x1="120" y1="120" x2="80" y2="90" stroke="#0B1220" stroke-width="4"/>
    <line x1="280" y1="120" x2="320" y2="90" stroke="#0B1220" stroke-width="4"/>
    <circle cx="160" cy="90" r="18" fill="none" stroke="#64748B" stroke-width="2"/>
    <circle cx="240" cy="90" r="18" fill="none" stroke="#64748B" stroke-width="2"/>
    <circle cx="80" cy="90" r="18" fill="none" stroke="#64748B" stroke-width="2"/>
    <circle cx="320" cy="90" r="18" fill="none" stroke="#64748B" stroke-width="2"/>
    <circle cx="200" cy="120" r="12" fill="#2563EB"/>
  </g>

  <rect x="150" y="380" width="500" height="60" rx="8" fill="#0B1220" opacity="0.85"/>
  <text x="400" y="415" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="12">Perimeter Monitoring Active</text>
  <text x="400" y="470" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="14">Autonomous Drone Security Platform</text>
</svg>
