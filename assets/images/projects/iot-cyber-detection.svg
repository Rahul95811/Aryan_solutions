<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="IoT Cyber Attack Detection">
  <defs>
    <linearGradient id="bgI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071029"/>
      <stop offset="100%" stop-color="#071A2A"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgI)"/>

  <!-- IoT hub and nodes -->
  <g>
    <circle cx="400" cy="240" r="70" fill="#0EA5E9" opacity="0.12" stroke="#0EA5E9"/>
    <text x="400" y="245" text-anchor="middle" fill="#E6F7FF" font-family="Inter,sans-serif" font-size="12" font-weight="600">IoT Hub</text>

    <circle cx="200" cy="150" r="28" fill="#081426" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="600" cy="150" r="28" fill="#081426" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="150" cy="350" r="28" fill="#081426" stroke="#10B981" stroke-width="2"/>
    <circle cx="650" cy="350" r="28" fill="#081426" stroke="#EF4444" stroke-width="2"/>

    <line x1="400" y1="240" x2="200" y2="150" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="400" y1="240" x2="600" y2="150" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="400" y1="240" x2="150" y2="350" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="400" y1="240" x2="650" y2="350" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 4"/>

    <text x="650" y="355" text-anchor="middle" fill="#FFCDD5" font-family="Inter,sans-serif" font-size="9">ATTACK</text>
  </g>

  <text x="400" y="460" text-anchor="middle" fill="#94A3B8" font-family="Inter,sans-serif" font-size="14">Network Intrusion Detection System</text>
</svg>
