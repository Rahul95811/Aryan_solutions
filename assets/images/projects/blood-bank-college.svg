<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Blood Bank Management">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF7F8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgB)"/>

  <rect x="100" y="80" width="600" height="340" rx="16" fill="#fff" stroke="#F3E8EE"/>
  <!-- stylized blood drop -->
  <g transform="translate(280,110)">
    <path d="M120 20 C120 20 160 68 120 120 C80 68 120 20 120 20 Z" fill="#EF4444"/>
    <rect x="20" y="220" width="120" height="60" rx="8" fill="#FEE2E2"/>
    <rect x="160" y="220" width="120" height="60" rx="8" fill="#FEE2E2"/>
    <rect x="300" y="220" width="120" height="60" rx="8" fill="#FEE2E2"/>
    <text x="80" y="260" text-anchor="middle" fill="#991B1B" font-family="Inter,sans-serif" font-size="12" font-weight="600">A+</text>
    <text x="220" y="260" text-anchor="middle" fill="#991B1B" font-family="Inter,sans-serif" font-size="12" font-weight="600">B+</text>
    <text x="360" y="260" text-anchor="middle" fill="#991B1B" font-family="Inter,sans-serif" font-size="12" font-weight="600">O+</text>
  </g>

  <text x="400" y="460" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="14">Blood Bank Management Platform</text>
</svg>
